<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>SEQUENCER</h1>
        <div class="subtitle">SYNTH GENERATOR</div>

        <div class="control-group">
            <label>VIBE</label>
            <select id="mood">
                <optgroup label="Synthwave">
                                        <option value="chrome">Chrome Horizon</option>
                    <option value="midnight">Midnight Drive</option>
                    <option value="neon">Neon Tears</option>

                </optgroup>
                <optgroup label="Dark">
                    <option value="knifeWalker">Knife Walker</option>
                    <option value="afterhours">After Hours</option>
                    <option value="tokyo">Tokyo Nights</option>
                </optgroup>
                <optgroup label="Bright">
                    <option value="oslo">Oslo Dreams</option>
                    <option value="sunset">Sunset Strip</option>
                </optgroup>
            </select>
        </div>
        
        <div class="visualizer" id="visualizer"></div>

        <div class="section-label">ARRANGEMENT</div>

        <div class="arrangement-controls">
            <div class="row">
                <div class="control-group">
                    <label>BARS</label>
                    <select id="barCount">
                        <option value="16">16</option>
                        <option value="24">24</option>
                        <option value="32" selected>32</option>
                        <option value="48">48</option>
                        <option value="64">64</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>MODE</label>
                    <select id="arrangementMode">
                        <option value="arrangement">Arrangement</option>
                        <option value="loop">Infinite Loop</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="arrangement-grid" id="arrangementGrid"></div>

        <div class="arrangement-position">
            <span id="barPosition">Bar 1 / 32</span>
            <span id="timePosition">0:00</span>
        </div>

        <div class="buttons">
            <button id="playBtn">Play</button>
            <button id="stopBtn">Stop</button>
            <button id="newBtn">Regenerate</button>
            <button id="downloadBtn">Export WAV</button>
        </div>

        <div class="status" id="status">Select a vibe and press Play</div>

        <div class="control-group">
            <label>TEMPO</label>
            <input type="range" id="tempo" min="70" max="180" value="110">
            <div class="value-display" id="tempoVal">110 BPM</div>
        </div>



        <div class="section-label">SEQUENCER</div>

        <div class="control-group">
            <label>ARP PATTERN</label>
            <select id="arpPattern">
                <option value="up">Up</option>
                <option value="down">Down</option>
                <option value="updown">Up-Down</option>
                <option value="downup">Down-Up</option>
                <option value="random">Random</option>
                <option value="converge">Converge</option>
            </select>
        </div>

        <div class="row">
            <div class="control-group">
                <label>LEAD BRIGHTNESS</label>
                <input type="range" id="brightness" min="1" max="10" value="6">
                <div class="value-display" id="brightnessVal">60%</div>
            </div>
            <div class="control-group">
                <label>LEAD GLISSANDO</label>
                <input type="range" id="glissando" min="0" max="10" value="0">
                <div class="value-display" id="glissandoVal">0%</div>
            </div>
            <div class="control-group">
                <label>DENSITY</label>
                <input type="range" id="density" min="1" max="5" value="3">
                <div class="value-display" id="densityVal">3</div>
            </div>
        </div>

        <div class="section-label">MODULATION</div>

        <div class="row">
            <div class="control-group">
                <label>LFO RATE</label>
                <input type="range" id="lfoRate" min="1" max="10" value="4">
                <div class="value-display" id="lfoRateVal">0.08 Hz</div>
            </div>
            <div class="control-group">
                <label>LFO DEPTH</label>
                <input type="range" id="lfoDepth" min="0" max="10" value="5">
                <div class="value-display" id="lfoDepthVal">50%</div>
            </div>
        </div>

        <div class="section-label">SPACE</div>

        <div class="row">
            <div class="control-group">
                <label>STEREO WIDTH</label>
                <input type="range" id="stereoWidth" min="0" max="10" value="7">
                <div class="value-display" id="stereoWidthVal">70%</div>
            </div>
            <div class="control-group">
                <label>REVERB</label>
                <input type="range" id="space" min="1" max="5" value="3">
                <div class="value-display" id="spaceVal">3</div>
            </div>
        </div>

        <div class="section-label">MIXER</div>

        <div class="row">
            <div class="control-group">
                <label>KICK</label>
                <input type="range" id="volKick" min="0" max="10" value="6">
            </div>
            <div class="control-group">
                <label>SNARE</label>
                <input type="range" id="volSnare" min="0" max="10" value="5">
            </div>
            <div class="control-group">
                <label>BASS</label>
                <input type="range" id="volBass" min="0" max="10" value="5">
            </div>
            <div class="control-group">
                <label>SUB</label>
                <input type="range" id="volSub" min="0" max="10" value="4">
            </div>
        </div>

        <div class="row">
            <div class="control-group">
                <label>SEQ 1</label>
                <input type="range" id="volSeq1" min="0" max="10" value="6">
            </div>
            <div class="control-group">
                <label>SEQ 2</label>
                <input type="range" id="volSeq2" min="0" max="10" value="4">
            </div>
            <div class="control-group">
                <label>LEAD</label>
                <input type="range" id="volLead" min="0" max="10" value="5">
            </div>
            <div class="control-group">
                <label>PAD</label>
                <input type="range" id="volPad" min="0" max="10" value="5">
            </div>
        </div>

    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
